name: 'AI-based PR Reviewer & Summarizer with Chat Capabilities'
description: 'AI-based PR Reviewer & Summarizer with Chat Capabilities'
branding:
  icon: 'git-merge'
  color: 'orange'
author: 'NullarAI LLC'
inputs:
  debug:
    required: false
    description: 'Enable debug mode'
    default: 'false'
  max_files:
    required: false
    description:
      'Max files to summarize and review. Less than or equal to 0 means no
      limit.'
    default: '150'
  review_simple_changes:
    required: false
    description: 'Review even when the changes are simple'
    default: 'false'
  review_comment_lgtm:
    required: false
    description: 'Leave comments even if the patch is LGTM'
    default: 'false'
  path_filters:
    required: false
    description: |
      The path filters, e.g., "src/**.py", "!dist/**", each line will be considered as one pattern.
      See also

      - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore
      - https://github.com/isaacs/minimatch
    default: |
      !dist/**
      !**/*.app
      !**/*.bin
      !**/*.bz2
      !**/*.class
      !**/*.db
      !**/*.csv
      !**/*.tsv
      !**/*.dat
      !**/*.dll
      !**/*.dylib
      !**/*.egg
      !**/*.glif
      !**/*.gz
      !**/*.xz
      !**/*.zip
      !**/*.7z
      !**/*.rar
      !**/*.zst
      !**/*.ico
      !**/*.jar
      !**/*.tar
      !**/*.war
      !**/*.lo
      !**/*.log
      !**/*.mp3
      !**/*.wav
      !**/*.wma
      !**/*.mp4
      !**/*.avi
      !**/*.mkv
      !**/*.wmv
      !**/*.m4a
      !**/*.m4v
      !**/*.3gp
      !**/*.3g2
      !**/*.rm
      !**/*.mov
      !**/*.flv
      !**/*.iso
      !**/*.swf
      !**/*.flac
      !**/*.nar
      !**/*.o
      !**/*.ogg
      !**/*.otf
      !**/*.p
      !**/*.pdf
      !**/*.doc
      !**/*.docx
      !**/*.xls
      !**/*.xlsx
      !**/*.ppt
      !**/*.pptx
      !**/*.pkl
      !**/*.pickle
      !**/*.pyc
      !**/*.pyd
      !**/*.pyo
      !**/*.pub
      !**/*.pem
      !**/*.rkt
      !**/*.so
      !**/*.ss
      !**/*.eot
      !**/*.exe
      !**/*.pb.go
      !**/*.lock
      !**/*.ttf
      !**/*.yaml
      !**/*.yml
      !**/*.cfg
      !**/*.toml
      !**/*.ini
      !**/*.mod
      !**/*.sum
      !**/*.work
      !**/*.json
      !**/*.mmd
      !**/*.svg
      !**/*.jpeg
      !**/*.jpg
      !**/*.png
      !**/*.gif
      !**/*.bmp
      !**/*.tiff
      !**/*.webm
      !**/*.woff
      !**/*.woff2
      !**/*.dot
      !**/*.md5sum
      !**/*.wasm
      !**/*.snap
      !**/*.parquet
      !**/gen/**
      !**/_gen/**
      !**/generated/**
      !**/@generated/**
      !**/vendor/**
      !**/*.min.js
      !**/*.min.js.map
      !**/*.min.js.css
      !**/*.tfstate
      !**/*.tfstate.backup
  disable_review:
    required: false
    description: 'Only provide the summary and skip the code review.'
    default: 'false'
  disable_release_notes:
    required: false
    description: 'Disable release notes'
    default: 'false'
  api_base_url:
    required: false
    description: 'Default base URL for provider-compatible chat completions.'
    default: 'https://api.minimax.io/v1'
  leader_model:
    required: false
    description: 'Leader model used for summary, validation, and final decisions.'
    default: 'MiniMax-M2.5'
  leader_api_base_url:
    required: false
    description: 'Leader model API base URL.'
    default: 'https://api.minimax.io/v1'
  leader_api_key_env:
    required: false
    description: 'Environment variable name that contains leader API key.'
    default: 'AI_API_KEY'
  helper_models:
    required: false
    description: 'JSON array of helper model configs: [{"model":"...","apiBaseUrl":"...","apiKeyEnv":"..."}]'
    default: '[]'
  model_temperature:
    required: false
    description: 'Temperature for model responses'
    default: '0.05'
  api_retries:
    required: false
    description: 'Retry count for provider API calls'
    default: '5'
  api_timeout_ms:
    required: false
    description: 'Timeout for provider API call in milliseconds'
    default: '360000'
  llm_concurrency_limit:
    required: false
    description: 'How many concurrent API calls to make to LLM providers?'
    default: '6'
  openai_base_url:
    required: false
    description:
      'Deprecated alias for api_base_url. Use api_base_url instead.'
    default: ''
  openai_light_model:
    required: false
    description:
      'Deprecated alias for leader_model. Use leader_model instead.'
    default: ''
  openai_heavy_model:
    required: false
    description: 'Deprecated alias. Ignored; kept for backward compatibility.'
    default: ''
  openai_model_temperature:
    required: false
    description: 'Deprecated alias for model_temperature. Use model_temperature instead.'
    default: ''
  openai_retries:
    required: false
    description: 'Deprecated alias for api_retries. Use api_retries instead.'
    default: ''
  openai_timeout_ms:
    required: false
    description: 'Deprecated alias for api_timeout_ms. Use api_timeout_ms instead.'
    default: ''
  openai_concurrency_limit:
    required: false
    description: 'Deprecated alias for llm_concurrency_limit. Use llm_concurrency_limit instead.'
    default: ''
  github_concurrency_limit:
    required: false
    description: 'How many concurrent API calls to make to GitHub?'
    default: '6'
  system_message:
    required: false
    description: 'System message to be sent to the leader/helper models'
    default: |
      You are `@nullarai` (aka `github-actions[bot]`), a language model
      trained for code review. Your purpose is to act as a highly experienced
      senior security engineer and software architect. Provide a thorough,
      strict review of code hunks and suggest code snippets to improve key areas:
        - Logic correctness and edge cases
        - Security vulnerabilities (OWASP Top 10, CWE Top 25)
        - Advanced security: IDOR, TOCTOU, timing attacks, prototype pollution, ReDoS, JWT confusion, SSRF
        - Authentication & authorization completeness
        - Cryptographic correctness and secret management
        - Data integrity: floating-point precision, integer overflow, type coercion
        - Financial/monetary calculation correctness
        - Performance and resource management (memory leaks, unbounded growth)
        - Concurrency, race conditions, and data races
        - Input validation and boundary conditions (off-by-one, edge cases)
        - Error handling and information disclosure
        - Sensitive data protection (PCI-DSS, GDPR)
        - Absence analysis: flag missing protections, not just broken code
        - Best practices: DRY, SOLID, KISS

      Be strict. Flag every real issue regardless of how subtle or theoretical
      it may seem. Do not comment on minor code style issues or missing
      comments/documentation. Focus on issues that could cause security
      vulnerabilities, data corruption, logic errors, or resource exhaustion.
  summarize:
    required: false
    description: 'The prompt for final summarization response'
    default: |
      Provide your final response in markdown with the following content:

      - **Walkthrough**: A high-level summary of the overall change instead of 
        specific files within 80 words.
      - **Changes**: A markdown table of files and their summaries. Group files 
        with similar changes together into a single row to save space.
      - **Poem**: Below the changes, include a whimsical, short poem written by 
        a rabbit to celebrate the changes. Format the poem as a quote using 
        the ">" symbol and feel free to use emojis where relevant.

      Avoid additional commentary as this summary will be added as a comment on the 
      GitHub pull request. Use the titles "Walkthrough" and "Changes" and they must be H2.

  summarize_release_notes:
    required: false
    description:
      'The prompt for generating release notes in the same chat as summarize
      stage'
    default: |
      Craft concise release notes for the pull request. 
      Focus on the purpose and user impact, categorizing changes as "New Feature", "Bug Fix", 
      "Documentation", "Refactor", "Style", "Test", "Chore", or "Revert". Provide a bullet-point list, 
      e.g., "- New Feature: Added search functionality to the UI". Limit your response to 50-100 words 
      and emphasize features visible to the end-user while omitting code-level details.
  language:
    required: false
    description: ISO code for the response language
    default: en-US
  bot_icon:
    required: false
    description: 'The icon for the bot'
    default: '<img src="https://avatars.githubusercontent.com/u/256998799?s=41" alt="Image description" width="20" height="20">'
runs:
  using: 'node16'
  main: 'dist/index.js'
